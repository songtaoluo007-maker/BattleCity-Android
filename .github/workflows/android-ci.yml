name: Android CI

on:
  push:
    branches: ["main"]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle 8.9
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "8.9"

      - name: Run unit tests
        shell: bash
        run: |
          set +e
          gradle :app:testDebugUnitTest --stacktrace --console=plain 2>&1 | tee ci-test.log
          status=${PIPESTATUS[0]}
          exit "$status"

      - name: Upload test diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: BattleCity-Android-test-diagnostics
          path: |
            ci-test.log
            app/build/test-results/**/*.xml
            app/build/reports/tests/**
          if-no-files-found: warn
          retention-days: 7

      - name: Build debug APK
        run: gradle :app:assembleDebug --stacktrace --console=plain

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: BattleCity-Android-debug
          path: app/build/outputs/apk/debug/app-debug.apk
          if-no-files-found: error
          retention-days: 14
