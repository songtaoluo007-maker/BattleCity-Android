name: Patch high precision clock

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/patch-high-precision-clock.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Patch GameEngine clock integration
        run: |
          python - <<'PY'
          from pathlib import Path
          import re

          path = Path('app/src/main/java/com/songtaoluo/battlecity/game/GameEngine.kt')
          text = path.read_text(encoding='utf-8')

          property_pattern = re.compile(
              r'    var battleElapsedMs: Long = 0L\n        private set'
          )
          property_replacement = (
              '    private val battleClock = BattleClock()\n\n'
              '    val battleElapsedMs: Long\n'
              '        get() = battleClock.elapsedMs'
          )
          text, property_count = property_pattern.subn(property_replacement, text, count=1)

          old_advance = '        battleElapsedMs += (deltaSeconds.coerceAtLeast(0f) * 1000f).toLong()'
          new_advance = '        battleClock.advance(deltaSeconds)'
          advance_count = text.count(old_advance)
          text = text.replace(old_advance, new_advance, 1)

          if property_count != 1:
              raise SystemExit(f'battleElapsedMs property replacements: {property_count}')
          if advance_count != 1:
              raise SystemExit(f'battleElapsedMs advance matches: {advance_count}')

          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove one-time workflow and commit patch
        run: |
          rm .github/workflows/patch-high-precision-clock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/songtaoluo/battlecity/game/GameEngine.kt .github/workflows/patch-high-precision-clock.yml
          git commit -m "refactor: use fractional battle clock"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
