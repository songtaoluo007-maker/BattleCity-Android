name: Patch high precision clock

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/patch-high-precision-clock.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Patch GameEngine clock integration
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/src/main/java/com/songtaoluo/battlecity/game/GameEngine.kt')
          text = path.read_text(encoding='utf-8')

          old_property = '''    var battleElapsedMs: Long = 0L
              private set
          '''
          new_property = '''    private val battleClock = BattleClock()

              val battleElapsedMs: Long
                  get() = battleClock.elapsedMs
          '''
          old_advance = '        battleElapsedMs += (deltaSeconds.coerceAtLeast(0f) * 1000f).toLong()'
          new_advance = '        battleClock.advance(deltaSeconds)'

          if old_property not in text:
              raise SystemExit('battleElapsedMs property block not found')
          if old_advance not in text:
              raise SystemExit('battleElapsedMs advance line not found')

          text = text.replace(old_property, new_property, 1)
          text = text.replace(old_advance, new_advance, 1)
          path.write_text(text, encoding='utf-8')
          PY

      - name: Remove one-time workflow and commit patch
        run: |
          rm .github/workflows/patch-high-precision-clock.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/songtaoluo/battlecity/game/GameEngine.kt .github/workflows/patch-high-precision-clock.yml
          git commit -m "refactor: use fractional battle clock"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
