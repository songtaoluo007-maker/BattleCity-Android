name: Sync audio branch with main

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/sync-audio-with-main.yml'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Merge current main into audio branch
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git merge origin/main --no-edit

      - name: Remove one-time workflow and push
        run: |
          rm .github/workflows/sync-audio-with-main.yml
          git add .github/workflows/sync-audio-with-main.yml
          git commit -m "chore: remove one-time branch sync workflow"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
