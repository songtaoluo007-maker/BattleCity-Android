name: Patch result art panel

on:
  pull_request:
    branches: [ main ]
    paths:
      - '.github/workflows/patch-result-art.yml'

permissions:
  contents: write

jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref }}
          fetch-depth: 0

      - name: Route battle results through original art panel
        run: |
          python - <<'PY'
          from pathlib import Path

          path = Path('app/src/main/java/com/songtaoluo/battlecity/ui/BattleContent.kt')
          text = path.read_text(encoding='utf-8')
          old = '                ResultPanel('
          new = '                ResultArtPanel('
          if text.count(old) != 1:
              raise SystemExit(f'ResultPanel call matches: {text.count(old)}')
          path.write_text(text.replace(old, new, 1), encoding='utf-8')
          PY

      - name: Remove one-time workflow and commit patch
        run: |
          rm .github/workflows/patch-result-art.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add app/src/main/java/com/songtaoluo/battlecity/ui/BattleContent.kt .github/workflows/patch-result-art.yml
          git commit -m "refactor: route battle results through original artwork"
          git push origin HEAD:${{ github.event.pull_request.head.ref }}
